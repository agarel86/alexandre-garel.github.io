function getP(k){var r=Z[k];if(!r)return[];var o=[];for(var i=0;i<r.v.length;i++){if(r.v[i]!==0)o.push({date:DT[r.s+i],value:r.v[i]});}return o;}
function mRet(p){var r=[];for(var i=1;i<p.length;i++)if(p[i-1].value&&p[i].value)r.push({date:p[i].date,ret:p[i].value/p[i-1].value-1});return r;}
function filt(d,s,e){return d.filter(function(x){return x.date>=s&&x.date<=e;});}
function avg(a){return a.reduce(function(s,x){return s+x;},0)/a.length;}
function stdev(a){var m=avg(a);return Math.sqrt(a.reduce(function(s,x){return s+Math.pow(x-m,2);},0)/(a.length-1));}
function pc(v,d){d=d||2;return v!=null?(v*100).toFixed(d)+"%":"--";}
function nm(v,d){d=d||3;return v!=null?v.toFixed(d):"--";}

function calc(vP,eP,rf){
  var vR=mRet(vP),eR=mRet(eP);
  var eD={};eR.forEach(function(x){eD[x.date]=1;});
  var va=vR.filter(function(x){return eD[x.date];});
  var vDt={};va.forEach(function(x){vDt[x.date]=1;});
  var ea=eR.filter(function(x){return vDt[x.date];});
  if(va.length<3)return null;
  var vr=[],er=[];for(var i=0;i<va.length;i++){vr.push(va[i].ret);er.push(ea[i].ret);}
  var n=vr.length,rfm=Math.pow(1+rf,1/12)-1;
  var vC=1,eC=1;for(i=0;i<n;i++){vC*=(1+vr[i]);eC*=(1+er[i]);}
  var yr=n/12;
  var vA=Math.pow(vC,1/yr)-1,eA=Math.pow(eC,1/yr)-1;
  var vV=stdev(vr)*Math.sqrt(12),eV=stdev(er)*Math.sqrt(12);
  var vS=(vA-rf)/vV,eS=(eA-rf)/eV;
  var mv=avg(vr),me=avg(er);
  var cov=0;for(i=0;i<n;i++)cov+=(vr[i]-mv)*(er[i]-me);cov/=(n-1);
  var vv=0;for(i=0;i<n;i++)vv+=Math.pow(vr[i]-mv,2);vv/=(n-1);
  var beta=cov/vv;
  var alpha=(me-rfm-beta*(mv-rfm))*12;
  var dr=[];for(i=0;i<n;i++)dr.push(er[i]-vr[i]);
  var te=stdev(dr)*Math.sqrt(12);
  var ir=avg(dr)/stdev(dr)*Math.sqrt(12);
  var vxr=[],exr=[];for(i=0;i<n;i++){vxr.push(vr[i]-rfm);exr.push(er[i]-rfm);}
  var ssRes=0,ssTot=0,meExr=avg(exr);for(i=0;i<n;i++){var fitted=alpha/12+beta*vxr[i];ssRes+=Math.pow(exr[i]-fitted,2);ssTot+=Math.pow(exr[i]-meExr,2);}
  var r2=ssTot>0?1-ssRes/ssTot:null;
  function mdd(rs){var p=1,m=0,c=1;for(var j=0;j<rs.length;j++){c*=(1+rs[j]);p=Math.max(p,c);m=Math.min(m,c/p-1);}return m;}
  var cs=[{date:va[0].date,van:100,esg:100}];
  var cv=100,ce=100;
  for(i=0;i<n;i++){cv*=(1+vr[i]);ce*=(1+er[i]);cs.push({date:ea[i].date,van:+cv.toFixed(2),esg:+ce.toFixed(2)});}
  return{n:n,s0:va[0].date,s1:va[n-1].date,va:{a:vA,c:vC-1,vo:vV,sh:vS,md:mdd(vr)},es:{a:eA,c:eC-1,vo:eV,sh:eS,md:mdd(er),beta:beta,alpha:alpha,te:te,ir:ir,r2:r2},cs:cs};
}

  ];

  var tbody='';rows.forEach(function(r){tbody+='<tr><td>'+r.l+'</td><td class="mono" style="color:#3D8BFF">'+r.a+'</td><td class="mono" style="color:#00E4B8">'+r.b+'</td><td class="mono" style="color:'+dc(r.g)+'">'+r.d+'</td></tr>';});

  mc.innerHTML='<div class="card"><div class="ch">Cumulative (rebased 100) | '+m.s0+' to '+m.s1+' | '+m.n+' months</div><div class="cw"><canvas id="lc"></canvas></div></div><div class="card"><div class="ts"><table><thead><tr><th style="color:#6B7F96">Metric</th><th style="color:#3D8BFF">Vanilla</th><th style="color:#00E4B8">ESG</th><th style="color:#6B7F96">Delta</th></tr></thead><tbody>'+tbody+'</tbody></table></div></div><div class="card"><div class="ch">Sharpe Ratio</div><div class="cws"><canvas id="bc"></canvas></div></div><button class="mb" onclick="toggleM()">Show Methodology</button><div class="mp" id="mP"><p class="t">Formulas</p><p><b>Monthly return:</b> r_t = P_t / P_(t-1) - 1</p><p><b>Alignment:</b> Only months where both series have a close.</p><p><b>Ann. Return (geom.):</b> [(1+r_1)...(1+r_n)]^(12/n) - 1</p><p><b>Ann. Volatility:</b> std(monthly) x sqrt(12), sample std (n-1)</p><p><b>Sharpe:</b> (AnnRet - Rf) / AnnVol</p><p><b>Beta:</b> Cov(r_esg, r_van) / Var(r_van)</p><p><b>Alpha (Jensen, ann.):</b> [E(r_esg) - Rf_mo - B*(E(r_van) - Rf_mo)] x 12</p><p><b>Tracking Error:</b> std(r_esg - r_van) x sqrt(12)</p><p><b>Information Ratio:</b> mean(r_esg - r_van) / std(r_esg - r_van) x sqrt(12)</p><p><b>R\u00B2:</b> 1 - Var(residuals) / Var(r_esg excess), from the alpha regression</p><p><b>Max Drawdown:</b> max peak-to-trough in cumulative path</p><p><b>Delta:</b> Green = ESG better. Red = worse.</p><p class="n">Note: All MSCI pairs use Net Total Return USD on both sides. DAX uses Total Return EUR. NASDAQ-100 uses Price Return USD. Return type shown in badges.</p></div>';

  if(lineChart)lineChart.destroy();
  if(barChart)barChart.destroy();

  var lctx=document.getElementById('lc').getContext('2d');
  lineChart=new Chart(lctx,{type:'line',data:{labels:m.cs.map(function(d){return d.date;}),datasets:[{label:'Vanilla',data:m.cs.map(function(d){return d.van;}),borderColor:'#3D8BFF',backgroundColor:'rgba(61,139,255,0.08)',borderWidth:2,pointRadius:0,tension:0.1,fill:true},{label:'ESG',data:m.cs.map(function(d){return d.esg;}),borderColor:'#00E4B8',backgroundColor:'rgba(0,228,184,0.08)',borderWidth:2,pointRadius:0,tension:0.1,fill:true}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#C8D4E0',font:{size:11},boxWidth:12,padding:16}},tooltip:{backgroundColor:'#10151D',borderColor:'#1C2636',borderWidth:1,titleColor:'#6B7F96',bodyColor:'#C8D4E0',padding:10,callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1);}}}},scales:{x:{ticks:{color:'#4A5E78',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{color:'rgba(28,38,54,0.5)'}},y:{ticks:{color:'#4A5E78',font:{size:9}},grid:{color:'rgba(28,38,54,0.5)'}}}}});

  var bctx=document.getElementById('bc').getContext('2d');
  barChart=new Chart(bctx,{type:'bar',data:{labels:['Vanilla','ESG'],datasets:[{data:[m.va.sh,m.es.sh],backgroundColor:['#3D8BFF','#00E4B8'],borderRadius:4,barPercentage:0.5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#10151D',borderColor:'#1C2636',borderWidth:1,bodyColor:'#C8D4E0',padding:8,callbacks:{label:function(c){return 'Sharpe: '+c.parsed.x.toFixed(3);}}}},scales:{x:{ticks:{color:'#4A5E78',font:{size:9}},grid:{color:'rgba(28,38,54,0.5)'}},y:{ticks:{color:'#C8D4E0',font:{size:11}},grid:{display:false}}}}});
}

function toggleM(){var p=document.getElementById('mP');var b=p.previousElementSibling;if(p.className.indexOf('open')>=0){p.className='mp';b.textContent='Show Methodology';}else{p.className='mp open';b.textContent='Hide Methodology';}}

(function(){
  var sel=document.getElementById('sP');
  PAIRS.forEach(function(p){var o=document.createElement('option');o.value=p.id;o.textContent=p.lb;sel.appendChild(o);});
  sel.value='MSCI_WORLD';
  ['sP','sF','sT','sR'].forEach(function(id){document.getElementById(id).addEventListener('change',render);});
  document.getElementById('sR').addEventListener('input',render);
  render();
})();
</script>
</body>
</html>
